<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时在线人数</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f23;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .count {
      font-size: 140px;
      font-weight: 900;
      background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin: 20px 0;
    }
    .label {
      font-size: 20px;
      color: #888;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .status {
      margin-top: 40px;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 245, 160, 0.1);
      color: #00f5a0;
      border: 1px solid rgba(0, 245, 160, 0.2);
    }
    .pulse {
      width: 10px;
      height: 10px;
      background: #00f5a0;
      border-radius: 50%;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">当前在线人数</div>
    <div class="count" id="count">-</div>
    <div class="status">
      <span class="pulse"></span>
      <span>实时更新中</span>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nqacduagdbjvvfljvzcg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_6SuYRtrULxHjO0nVDZhRyQ_SYz-dyMy';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const myId = 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
    
    let isOnline = false;
    let heartbeatInterval = null;

    async function goOnline() {
      const { error } = await supabase
        .from('online_users')
        .upsert({ id: myId, last_seen: new Date().toISOString() });
      
      if (!error) {
        isOnline = true;
        heartbeatInterval = setInterval(async () => {
          await supabase
            .from('online_users')
            .upsert({ id: myId, last_seen: new Date().toISOString() });
        }, 10000);
      }
    }

    async function goOffline() {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      if (isOnline) {
        await supabase.from('online_users').delete().eq('id', myId);
        isOnline = false;
      }
    }

    async function updateCount() {
      const thirtyFiveSecAgo = new Date(Date.now() - 35000).toISOString();
      const { count, error } = await supabase
        .from('online_users')
        .select('*', { count: 'exact', head: true })
        .gt('last_seen', thirtyFiveSecAgo);
      
      if (!error) {
        document.getElementById('count').innerText = count || 0;
      }
    }

    goOnline();
    updateCount();
    setInterval(updateCount, 5000);

    window.onbeforeunload = goOffline;
    window.onpagehide = goOffline;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) goOffline();
      else goOnline();
    });
  </script>
</body>
</html>
